<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Imobiliárias RJ</title>
    <style>
        /* Reutilizando suas variáveis e estilo base */
        :root { --primary: #1e3a8a; --bg: #f8fafc; --text-main: #1e293b; --accent: #2563eb; --border: #e2e8f0; }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: var(--text-main); }

        /* Estilo do seu Topo (Copiado do seu index) */
        .topo {
            background: rgba(255,255,255,0.85);
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 30px;
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
        }
        .menu-horizontal { width: 100%; max-width: 1200px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-weight: 800; font-size: 24px; color: #111827; text-decoration: none; }
        .logo span { color: #2563eb; }

        /* Estilo da Caixa de Login */
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .login-container h2 {
            margin-top: 0;
            font-family: 'Georgia', serif;
            color: var(--primary);
            text-align: center;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box; /* Garante que o input não passe da borda */
            outline: none;
        }

        .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }

        .btn-entrar {
            width: 100%;
            background: var(--accent);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-entrar:hover { background: #1e40af; }

        .footer-login {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-login a { color: var(--accent); text-decoration: none; font-weight: bold; }
        
        .voltar {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #64748b;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header class="topo">
    <div class="menu-horizontal">
        <a href="index.html" class="logo">Imobiliárias<span>RJ</span></a>
        <a href="index.html" style="text-decoration:none; color:var(--accent); font-weight:bold;">← Voltar</a>
    </div>
</header>

<div class="login-container">
    <h2>Entrar no Portal</h2>
    
    <form>
        <div class="form-group">
            <label>E-mail ou CPF/CNPJ</label>
            <input type="text" placeholder="Digite seus dados...">
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" placeholder="Sua senha secreta...">
        </div>

        <button type="button" class="btn-entrar" onclick="alert('Aqui o PHP entraria em ação para validar seus dados na Hostinger!')">
            Acessar Minha Conta
        </button>
    </form>

    <div class="footer-login">
        Ainda não tem cadastro? <br>
        <a href="#">Criar conta de Pessoa Física</a> ou <br>
        <a href="#">Cadastrar minha Imobiliária</a>
    </div>

    <a href="index.html" class="voltar">Voltar para a página inicial</a>
</div>

</body>
</html>
