<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Oficial Imobiliárias Zona Sul</title>
    <style>
        :root { --primary: #1e3a8a; --accent: #22c55e; --bg: #f8fafc; --gold: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #1e293b; }

        /* HERO & STATS (Mantidos conforme sua escolha anterior) */
        .hero { height: 450px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1483729558449-99ef09a8c325?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center 30%; display: flex; flex-direction: column; justify-content: center; padding: 0 10%; color: white; }
        .hero h1 { font-size: 3rem; margin: 0; font-family: 'Georgia', serif; }
        .stats-bar { background: var(--primary); color: white; display: flex; justify-content: space-around; padding: 20px 5%; flex-wrap: wrap; border-bottom: 5px solid var(--gold); }

        /* GRID & CARDS */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; border-top: 8px solid #cbd5e1; transition: 0.3s; }
        .card.excelente { border-top-color: #22c55e; }
        .card-content { padding: 20px; }
        .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; text-decoration: none; margin-bottom: 8px; }
        .btn-agendar { width: 100%; padding: 12px; background: white; color: var(--primary); border: 2px solid var(--primary); border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* MODAL DE COMPARTILHAMENTO / ROTA */
        #modal-agendar { display: none; position: fixed; z-index: 1000; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; position: relative; text-align: center; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; }

        /* BOTÕES DE COMPARTILHAMENTO */
        .share-section { margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .share-title { font-size: 0.9rem; font-weight: bold; color: #64748b; margin-bottom: 15px; display: block; }
        .share-buttons { display: flex; justify-content: center; gap: 15px; }
        .share-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-size: 1.2rem; }
        .btn-sh-wa { background: #25d366; color: white; }
        .btn-sh-mail { background: #ea4335; color: white; }
        .btn-sh-copy { background: #64748b; color: white; }
        .share-btn:hover { transform: scale(1.1); }

        /* TOAST NOTIFICATION */
        #toast { visibility: hidden; min-width: 250px; background-color: #1e293b; color: #fff; text-align: center; border-radius: 10px; padding: 16px; position: fixed; z-index: 1100; left: 50%; top: 30px; transform: translateX(-50%); font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }
    </style>
</head>
<body>

<div id="toast">✅ Link copiado para a área de transferência!</div>

<section class="hero">
    <h4>Rio de Janeiro · Zona Sul</h4>
    <h1>Excelência Imobiliária</h1>
    <p>Agende visitas e compartilhe rotas com facilidade.</p>
</section>

<div class="container" id="lista">
    <div class="card excelente">
        <div class="card-content">
            <span class="tag-bairro">Ipanema</span>
            <h3>Judice & Araujo</h3>
            <p>📍 R. Visconde de Pirajá, 434</p>
            <a href="https://wa.me/5521996255150" class="btn-whatsapp">📱 WhatsApp</a>
            <button class="btn-agendar" onclick="abrirCompartilhamento('Judice & Araujo', 'R. Visconde de Pirajá, 434')">📍 Compartilhar Rota</button>
        </div>
    </div>
    </div>

<div id="modal-agendar">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">×</span>
        <h2 id="modal-titulo" style="color: var(--primary); margin: 0;">Compartilhar Rota</h2>
        <p id="modal-endereco" style="font-size: 0.9rem; color: #64748b; margin-top: 10px;"></p>
        
        <div class="share-section">
            <span class="share-title">ESCOLHA COMO COMPARTILHAR:</span>
            <div class="share-buttons">
                <button class="share-btn btn-sh-wa" id="shareWa" title="WhatsApp">
                    <span style="font-size: 1.5rem;">💬</span>
                </button>
                <button class="share-btn btn-sh-mail" id="shareMail" title="E-mail">
                    <span style="font-size: 1.5rem;">✉️</span>
                </button>
                <button class="share-btn btn-sh-copy" onclick="copiarLink()" title="Copiar Link">
                    <span style="font-size: 1.5rem;">🔗</span>
                </button>
            </div>
        </div>
        
        <button class="btn-agendar" style="margin-top: 20px; width: 100%;" onclick="irParaGoogleMaps()">Abrir no Google Maps</button>
    </div>
</div>

<script>
    let imobiliariaAtual = "";
    let enderecoAtual = "";

    function abrirCompartilhamento(nome, endereco) {
        imobiliariaAtual = nome;
        enderecoAtual = endereco;
        document.getElementById('modal-endereco').innerText = endereco;
        
        // Configura link WhatsApp
        const msgWa = `Olá! Veja a localização da imobiliária *${nome}* na Zona Sul: https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endereco)}`;
        document.getElementById('shareWa').onclick = () => window.open(`https://wa.me/?text=${msgWa}`, '_blank');

        // Configura link Email
        const subject = encodeURIComponent(`Rota para imobiliária: ${nome}`);
        const body = encodeURIComponent(`Olá, segue o endereço da ${nome}:\n\n${endereco}\n\nVeja no mapa: https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endereco)}`);
        document.getElementById('shareMail').onclick = () => window.location.href = `mailto:?subject=${subject}&body=${body}`;

        document.getElementById('modal-agendar').style.display = "flex";
    }

    function fecharModal() {
        document.getElementById('modal-agendar').style.display = "none";
    }

    function irParaGoogleMaps() {
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(enderecoAtual)}`, '_blank');
    }

    function copiarLink() {
        const urlRota = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(enderecoAtual)}`;
        
        // Copia para o clipboard
        navigator.clipboard.writeText(urlRota).then(() => {
            showToast();
        });
    }

    function showToast() {
        const x = document.getElementById("toast");
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
    }

    // Fechar modal ao clicar fora dele
    window.onclick = function(event) {
        if (event.target == document.getElementById('modal-agendar')) {
            fecharModal();
        }
    }
</script>

</body>
</html>
