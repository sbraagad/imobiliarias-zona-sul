<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Oficial Imobiliárias Zona Sul</title>

<style>

:root { 
--primary: #1e3a8a; 
--bg: #f8fafc; 
--text-main: #1e293b; 
--text-sub: #64748b; 
--border: #e2e8f0; 
--accent: #2563eb; 
}

body {
font-family: 'Segoe UI', Tahoma, sans-serif;
margin:0;
background:var(--bg);
color:var(--text-main);
line-height:1.6;
}

/* HERO */

.hero{
height:400px;
background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)),
url('https://images.unsplash.com/photo-1483729558449-99ef09a8c325?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero h1{
font-size:3.2rem;
margin:0;
font-family:'Georgia',serif;
}

.hero p{
font-size:1.2rem;
opacity:0.9;
max-width:650px;
}

/* VANTAGENS */

.vantagens{
padding:60px 10%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
background:white;
text-align:center;
}

.vantagem-item h3{
color:var(--primary);
margin-bottom:10px;
}

.vantagem-item p{
color:var(--text-sub);
font-size:0.9rem;
}

/* FILTROS */

.filter-section{
background:#f1f5f9;
padding:35px 0;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:1000;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.filter-container{
max-width:1200px;
margin:0 auto;
padding:0 20px;
}

.dashboard-info{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.info-item{
display:flex;
align-items:center;
gap:12px;
background:white;
padding:15px;
border-radius:10px;
}

.info-icon{
font-size:1.4rem;
color:var(--accent);
}

.info-text span{
display:block;
font-size:0.7rem;
color:var(--text-sub);
text-transform:uppercase;
font-weight:bold;
}

.info-text strong{
font-size:1rem;
color:var(--primary);
}

/* ANÁLISES */

.analysis-trigger{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.btn-analysis{
background:white;
border:1px solid var(--border);
padding:9px 16px;
border-radius:50px;
cursor:pointer;
font-size:0.8rem;
font-weight:600;
color:var(--primary);
}

#panel-analysis{
display:none;
margin-bottom:20px;
background:#fffbeb;
border:1px solid #fef3c7;
padding:20px;
border-radius:12px;
font-size:0.9rem;
}

/* BUSCA */

input#busca{
width:100%;
padding:14px 22px;
border-radius:50px;
border:1px solid var(--border);
font-size:1rem;
margin-bottom:15px;
}

.options-row{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

select{
padding:11px;
border-radius:8px;
border:1px solid var(--border);
background:#f8fafc;
font-weight:500;
font-size:0.85rem;
}

/* CARDS */

.container{
max-width:1200px;
margin:60px auto;
padding:0 20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
border:1px solid var(--border);
padding:25px;
position:relative;
display:flex;
flex-direction:column;
}

.card.excelente::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
height:6px;
background:#22c55e;
border-radius:12px 12px 0 0;
}

.logo-container{
width:60px;
height:60px;
background:#f1f5f9;
border-radius:50%;
position:absolute;
top:25px;
right:25px;
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
}

.card-header{
padding-right:70px;
min-height:65px;
}

.card h3{
margin:0;
font-family:'Georgia',serif;
font-size:1.3rem;
}

.badge-excelente{
font-size:0.65rem;
color:#16a34a;
background:#f0fdf4;
padding:4px 8px;
border-radius:4px;
font-weight:bold;
margin-top:5px;
display:inline-block;
}

.creci{
font-size:0.65rem;
color:var(--text-sub);
background:#f1f5f9;
padding:3px 8px;
border-radius:4px;
display:inline-block;
margin:10px 0;
font-weight:bold;
}

.address{
font-size:0.8rem;
color:var(--text-sub);
margin-bottom:12px;
display:block;
}

.card-footer{
border-top:1px solid #f1f5f9;
padding-top:15px;
margin-top:auto;
display:flex;
flex-direction:column;
gap:8px;
}

/* BOTÃO WHATSAPP MELHORADO */

.phone-whatsapp{
display:flex;
align-items:center;
gap:8px;
background:#25D366;
color:white;
padding:8px 12px;
border-radius:6px;
text-decoration:none;
font-weight:600;
font-size:0.9rem;
width:fit-content;
}

.site-link{
color:var(--accent);
font-weight:bold;
text-decoration:none;
font-size:0.9rem;
}

/* FOOTER */

footer{
background:#0f172a;
color:#94a3b8;
padding:60px 10% 30px;
text-align:center;
margin-top:80px;
}

.footer-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:40px;
text-align:left;
margin-bottom:40px;
}

.footer-grid h4{
color:white;
margin-bottom:15px;
}

</style>
</head>

<body>

<section class="hero">

</div>
</div>

</div>

</body>
</html>
